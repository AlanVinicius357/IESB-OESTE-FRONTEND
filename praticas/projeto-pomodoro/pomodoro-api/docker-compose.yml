services:
  mysql:
    image: mysql:8.0
    container_name: pomodoro_mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: pomodoro_db
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql

  api:
    build: .
    container_name: pomodoro_api
    restart: always
    ports:
      - "3333:3333"
    depends_on:
      - mysql
    volumes:
      - .:/usr/src/app
      - /usr/src/app/node_modules
    environment:
      - NODE_ENV=development
      - DATABASE_URL=mysql://root:root@mysql:3306/pomodoro_db
      - PORT=3333

volumes:
  mysql_data: